# TFPC 前端 + 反向代理（nginx）
# 对外仅监听 5173；所有后端/MinIO 流量均在此端口内部反代，组件间走容器名直连。

server {
    listen 5173;
    server_name _;

    # 前端 SPA 静态产物
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 512m;

    # ---------- 后端 API（Django/DRF） ----------
    # 浏览器请求 /api/v1/... -> server:8000
    location /api/ {
        proxy_pass http://server:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---------- Django Admin ----------
    location /admin/ {
        proxy_pass http://server:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Django collectstatic 静态资源 ----------
    # /static/* 由共享卷直接提供（server 容器 collectstatic 输出到 /srv/django-static）
    location /static/ {
        alias /srv/django-static/;
        access_log off;
        expires 30d;
    }

    # ---------- MinIO 文件下载/预览（预签名 URL） ----------
    # 预签名 URL 形如 http://127.0.0.1:5173/<bucket>/<object>?X-Amz-Signature=...
    # 签名计算包含 Host 头，故必须保留浏览器原始 Host（127.0.0.1:5173），否则 403 SignatureDoesNotMatch。
    # 默认 bucket 为 tfpc；若修改了 MINIO_BUCKET，请同步修改此处前缀。
    location /tfpc/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---------- SPA 前端路由兜底 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
